<!DOCTYPE html>
<html>
<body>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    const ME = 'Ana'        // troque para 'Bruno' na segunda aba
    const ROOM = 'geral'

    const socket = io('http://localhost:3000')

    socket.on('connect', () => {
      socket.emit('user:join', { username: ME })
    })

    socket.on('user:joined', () => {
      console.log(`Logado como ${ME}`)
      socket.emit('room:join', { room: ROOM })
    })

    socket.on('room:joined', () => {
      // Simula digitação após entrar na sala
      setTimeout(() => {
        console.log('Começando a digitar...')
        socket.emit('typing:start', { room: ROOM })
      }, 1500)

      setTimeout(() => {
        console.log('Parou de digitar, enviando mensagem...')
        socket.emit('typing:stop', { room: ROOM })
        socket.emit('room:message', { room: ROOM, text: `Olá de ${ME}!` })
      }, 3500)
    })

    socket.on('presence:list',  (data) => console.log('👥 Online:', data.users.map(u => u.username)))
    socket.on('typing:update',  (data) => console.log('✏️  Typing:', data))
    socket.on('room:message',   (data) => console.log('💬 Msg:', data))
    socket.on('error',          (err)  => console.error('Erro:', err))
  </script>
</body>
</html>
