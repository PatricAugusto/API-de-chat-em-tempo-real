<!DOCTYPE html>
<html>
<body>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    const ME = 'Ana'       // troque para 'Bruno' na segunda aba
    const TARGET = 'Bruno' // troque para 'Ana' na segunda aba

    const socket = io('http://localhost:3000')

    socket.on('connect', () => {
      socket.emit('user:join', { username: ME })
    })

    socket.on('user:joined', () => {
      console.log(`Logado como ${ME}`)

      // Envia uma DM após 1s (garante que o TARGET já conectou)
      setTimeout(() => {
        socket.emit('dm:send', { toUsername: TARGET, text: `Oi ${TARGET}, sou o ${ME}!` })
      }, 1000)
    })

    // Mensagem entregue com sucesso (eco para quem enviou)
    socket.on('dm:sent', (msg) => {
      console.log('✓ Enviado:', msg)
    })

    // Mensagem recebida de outro usuário
    socket.on('dm:received', (msg) => {
      console.log('📩 Recebido:', msg)

      // Busca o histórico logo após receber a primeira mensagem
      socket.emit('dm:history', { withUsername: msg.from })
    })

    // Histórico retornado
    socket.on('dm:history', (data) => {
      console.log('📜 Histórico com', data.withUsername, data.messages)
    })

    socket.on('error', (err) => console.error('Erro:', err))
  </script>
</body>
</html>
