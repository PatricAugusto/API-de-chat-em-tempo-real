<!DOCTYPE html>
<html>
<body>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    const USERNAME = 'Ana' // troque na segunda aba

    async function start() {
      // 1. Faz login e obtém token
      const res = await fetch('http://localhost:3000/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: USERNAME })
      })
      const { token } = await res.json()
      console.log('Token obtido:', token)

      // 2. Conecta ao WebSocket com o token no handshake
      const socket = io('http://localhost:3000', {
        auth: { token }
      })

      socket.on('connect', () => {
        console.log('Conectado como', USERNAME)
        socket.emit('room:join', { room: 'geral' })
      })

      socket.on('connect_error', (err) => {
        console.error('Erro de conexão:', err.message)
      })

      socket.on('room:joined',   (data) => console.log('Entrou:', data))
      socket.on('presence:list', (data) => console.log('Online:', data.users.map(u => u.username)))
      socket.on('room:message',  (data) => console.log('Msg:', data))
      socket.on('typing:update', (data) => console.log('Typing:', data))
      socket.on('error',         (err)  => console.error('Erro:', err))
    }

    start()
  </script>
</body>
</html>
